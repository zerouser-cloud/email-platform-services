x-shared-env: &shared-env
  GATEWAY_PORT: ${GATEWAY_PORT}
  AUTH_PORT: ${AUTH_PORT}
  SENDER_PORT: ${SENDER_PORT}
  PARSER_PORT: ${PARSER_PORT}
  AUDIENCE_PORT: ${AUDIENCE_PORT}
  NOTIFIER_PORT: ${NOTIFIER_PORT}
  AUTH_GRPC_URL: ${AUTH_GRPC_URL}
  SENDER_GRPC_URL: ${SENDER_GRPC_URL}
  PARSER_GRPC_URL: ${PARSER_GRPC_URL}
  AUDIENCE_GRPC_URL: ${AUDIENCE_GRPC_URL}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  RABBITMQ_URL: ${RABBITMQ_URL}
  STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
  STORAGE_PORT: ${STORAGE_PORT}
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
  STORAGE_BUCKET: ${STORAGE_BUCKET}
  STORAGE_REGION: ${STORAGE_REGION}
  LOG_LEVEL: ${LOG_LEVEL}
  LOG_FORMAT: ${LOG_FORMAT}
  CORS_ORIGINS: ${CORS_ORIGINS}
  CORS_STRICT: ${CORS_STRICT}
  PROTO_DIR: ${PROTO_DIR:-/app/proto}
  GRPC_DEADLINE_MS: ${GRPC_DEADLINE_MS}
  RATE_LIMIT_BURST_TTL: ${RATE_LIMIT_BURST_TTL}
  RATE_LIMIT_BURST_LIMIT: ${RATE_LIMIT_BURST_LIMIT}
  RATE_LIMIT_SUSTAINED_TTL: ${RATE_LIMIT_SUSTAINED_TTL}
  RATE_LIMIT_SUSTAINED_LIMIT: ${RATE_LIMIT_SUSTAINED_LIMIT}

services:

  gateway:
    image: ghcr.io/zerouser-cloud/email-platform-gateway:${IMAGE_TAG:-latest}
    ports: ["3000:3000"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth:
    image: ghcr.io/zerouser-cloud/email-platform-auth:${IMAGE_TAG:-latest}
    expose: ["3001", "50051"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sender:
    image: ghcr.io/zerouser-cloud/email-platform-sender:${IMAGE_TAG:-latest}
    expose: ["3002", "50052"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3002/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  parser:
    image: ghcr.io/zerouser-cloud/email-platform-parser:${IMAGE_TAG:-latest}
    expose: ["3003", "50053"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3003/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  audience:
    image: ghcr.io/zerouser-cloud/email-platform-audience:${IMAGE_TAG:-latest}
    expose: ["3004", "50054"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3004/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  notifier:
    image: ghcr.io/zerouser-cloud/email-platform-notifier:${IMAGE_TAG:-latest}
    expose: ["3005"]
    restart: unless-stopped
    init: true
    environment:
      <<: *shared-env
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3005/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
