syntax = "proto3";

package auth;

import "common.proto";

service AuthService {
  rpc HealthCheck(common.Empty) returns (common.HealthStatus);
  rpc Login(LoginRequest) returns (TokenPair);
  rpc RefreshToken(RefreshRequest) returns (TokenPair);
  rpc ValidateToken(ValidateRequest) returns (UserContext);
  rpc RevokeToken(RevokeRequest) returns (common.Empty);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (UserList);
}

// --- Requests ---

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message ValidateRequest {
  string access_token = 1;
}

message RevokeRequest {
  string refresh_token = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string role = 3;
  string organization = 4;
  string team = 5;
}

message ListUsersRequest {
  common.PaginationRequest pagination = 1;
}

// --- Responses ---

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
}

message UserContext {
  string user_id = 1;
  string role = 2;
  string organization = 3;
  string team = 4;
}

message User {
  string id = 1;
  string email = 2;
  string role = 3;
  string organization = 4;
  string team = 5;
  string created_at = 6;
}

message UserList {
  repeated User users = 1;
  common.PaginationMeta pagination = 2;
}
